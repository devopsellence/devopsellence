name: devopsellence Release

on:
  workflow_dispatch:
    inputs:
      component:
        description: "Which component to release"
        required: true
        type: choice
        options:
          - both
          - agent
          - cli
        default: both
      source_ref:
        description: "Branch, tag, or commit SHA to build from; blank uses the selected workflow branch/tag"
        required: false
        type: string
      version:
        description: "Release version; required for stable, optional for prerelease"
        required: false
        type: string
      release_kind:
        description: "Stable releases must not include a prerelease suffix"
        required: true
        type: choice
        options:
          - stable
          - prerelease
        default: prerelease

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
    steps:
      - name: Resolve source ref
        id: resolve_source_ref
        env:
          DEFAULT_SOURCE_REF: ${{ github.ref }}
          SOURCE_REF_INPUT: ${{ inputs.source_ref }}
        run: |
          set -euo pipefail

          source_ref="$SOURCE_REF_INPUT"
          if [[ -z "$source_ref" ]]; then
            source_ref="$DEFAULT_SOURCE_REF"
          fi

          if [[ ! "$source_ref" =~ ^(refs/(heads|tags)/[A-Za-z0-9._/-]+|[0-9a-f]{7,40}|[A-Za-z0-9._/-]+)$ ]] || \
             [[ "$source_ref" == *..* ]] || \
             [[ "$source_ref" == /* ]] || \
             [[ "$source_ref" == */ ]]; then
            echo "source_ref must be a branch, tag, full ref, or commit SHA" >&2
            exit 1
          fi

          echo "source_ref=$source_ref" >> "$GITHUB_OUTPUT"
          echo "Resolved source ref: $source_ref"

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ steps.resolve_source_ref.outputs.source_ref }}

      - uses: jdx/mise-action@v4
        with:
          install: true

      - name: Validate inputs and resolve version
        id: resolve_version
        env:
          RELEASE_KIND_INPUT: ${{ inputs.release_kind }}
          SOURCE_REF_INPUT: ${{ steps.resolve_source_ref.outputs.source_ref }}
          VERSION_INPUT: ${{ inputs.version }}
        run: |
          set -euo pipefail

          version="$VERSION_INPUT"
          release_kind="$RELEASE_KIND_INPUT"
          source_ref="$SOURCE_REF_INPUT"
          short_sha="$(git rev-parse --short=12 HEAD)"

          case "$release_kind" in
            stable)
              if [[ -z "$version" ]]; then
                echo "stable releases require an explicit version" >&2
                exit 1
              fi
              if [[ ! "$version" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
                echo "version must look like v0.1.0" >&2
                exit 1
              fi
              if [[ "$version" == *-* ]]; then
                echo "stable releases must not include a prerelease suffix: $version" >&2
                exit 1
              fi
              ;;
            prerelease)
              if [[ -n "$version" ]]; then
                if [[ ! "$version" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
                  echo "version must look like v0.1.0-rc.1 when provided for prereleases" >&2
                  exit 1
                fi
                if [[ "$version" != *-* ]]; then
                  echo "prereleases must include a suffix like -rc.1 or -dev.1: $version" >&2
                  exit 1
                fi
              else
                version="$source_ref"
                case "$version" in
                  refs/heads/*) version="${version#refs/heads/}" ;;
                  refs/tags/*) version="${version#refs/tags/}" ;;
                esac
                if [[ "$version" =~ ^[0-9a-f]{7,40}$ ]]; then
                  version="sha"
                fi
                version="$(printf '%s' "$version" | sed -E 's/[^0-9A-Za-z._-]+/-/g; s/^-+//; s/-+$//; s/-+/-/g')"
                if [[ -z "$version" ]]; then
                  version="prerelease"
                fi
                version="${version}-${short_sha}"
              fi
              ;;
          esac

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Resolved release version: $version"

      - name: Run selected tests
        env:
          COMPONENT_INPUT: ${{ inputs.component }}
        run: |
          set -euo pipefail

          case "$COMPONENT_INPUT" in
            both)
              mise run test:agent
              mise run test:cli
              ;;
            agent)
              mise run test:agent
              ;;
            cli)
              mise run test:cli
              ;;
            *)
              echo "unknown component: $COMPONENT_INPUT" >&2
              exit 1
              ;;
          esac

      - name: Build and publish selected release(s)
        env:
          COMPONENT_INPUT: ${{ inputs.component }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_KIND_INPUT: ${{ inputs.release_kind }}
          SOURCE_REF_INPUT: ${{ steps.resolve_source_ref.outputs.source_ref }}
          VERSION_INPUT: ${{ steps.resolve_version.outputs.version }}
        run: |
          set -euo pipefail

          component="$COMPONENT_INPUT"
          version="$VERSION_INPUT"
          release_kind="$RELEASE_KIND_INPUT"
          source_ref="$SOURCE_REF_INPUT"
          target_sha="$(git rev-parse HEAD)"
          short_sha="$(git rev-parse --short=12 HEAD)"
          build_time="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          workspace_dir="$PWD"

          prerelease_flag=()
          if [[ "$release_kind" == "prerelease" ]]; then
            prerelease_flag=(--prerelease)
          fi

          publish_component() {
            local component="$1"
            local working_dir asset_prefix
            case "$component" in
              agent)
                working_dir="agent"
                asset_prefix="agent"
                ;;
              cli)
                working_dir="cli"
                asset_prefix="cli"
                ;;
              *)
                echo "unknown component: $component" >&2
                exit 1
                ;;
            esac

            local tag_name="${version}"
            local dist_dir="${workspace_dir}/${working_dir}/dist/${version}"
            local upload_dir="${dist_dir}/release-assets"
            local release_notes="devopsellence binary release for ${version} from ${source_ref} at ${target_sha}"

            if git rev-parse -q --verify "refs/tags/$tag_name" >/dev/null; then
              tag_target="$(git rev-list -n 1 "$tag_name")"
              if [[ "$tag_target" != "$target_sha" ]]; then
                echo "tag already exists at a different commit: $tag_name ($tag_target != $target_sha)" >&2
                exit 1
              fi
            fi

            DEVOPSELLENCE_RELEASE_VERSION="$version" \
              DEVOPSELLENCE_RELEASE_COMMIT="$short_sha" \
              DEVOPSELLENCE_RELEASE_BUILD_TIME="$build_time" \
              DEVOPSELLENCE_RELEASE_DIST_DIR="$dist_dir" \
              mise run "release:build:${component}"

            rm -rf "$upload_dir"
            mkdir -p "$upload_dir"
            cp "${dist_dir}/linux-amd64" "${upload_dir}/${asset_prefix}-linux-amd64"
            cp "${dist_dir}/linux-arm64" "${upload_dir}/${asset_prefix}-linux-arm64"
            cp "${dist_dir}/darwin-amd64" "${upload_dir}/${asset_prefix}-darwin-amd64"
            cp "${dist_dir}/darwin-arm64" "${upload_dir}/${asset_prefix}-darwin-arm64"
            awk -v prefix="${asset_prefix}-" '{ print $1 "  " prefix $2 }' \
              "${dist_dir}/SHA256SUMS" > "${upload_dir}/${asset_prefix}-SHA256SUMS"
            local release_assets=(
              "${upload_dir}/${asset_prefix}-linux-amd64"
              "${upload_dir}/${asset_prefix}-linux-arm64"
              "${upload_dir}/${asset_prefix}-darwin-amd64"
              "${upload_dir}/${asset_prefix}-darwin-arm64"
              "${upload_dir}/${asset_prefix}-SHA256SUMS"
            )

            if gh release view "$tag_name" >/dev/null 2>&1; then
              gh release edit "$tag_name" \
                --title "devopsellence ${version}" \
                --notes "$release_notes" \
                "${prerelease_flag[@]}"
              gh release upload "$tag_name" "${release_assets[@]}" --clobber
              return
            fi

            gh release create "$tag_name" \
              "${release_assets[@]}" \
              --title "devopsellence ${version}" \
              --notes "$release_notes" \
              --target "$target_sha" \
              "${prerelease_flag[@]}"
          }

          case "$component" in
            both)
              publish_component agent
              publish_component cli
              ;;
            agent|cli)
              publish_component "$component"
              ;;
            *)
              echo "unknown component: $component" >&2
              exit 1
              ;;
          esac
