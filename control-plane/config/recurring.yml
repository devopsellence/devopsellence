# examples:
#   periodic_cleanup:
#     class: CleanSoftDeletedRecordsJob
#     queue: background
#     args: [ 1000, { batch_size: 500 } ]
#     schedule: every hour
#   periodic_cleanup_with_command:
#     command: "SoftDeletedRecord.due.delete_all"
#     priority: 2
#     schedule: at 5am every day

development:
  ensure_runtime_bundles:
    command: "Runtime::EnsureBundles.enqueue"
    schedule: every 2 minutes
  reconcile_direct_dns_ingresses:
    class: EnvironmentIngresses::ReconcileAllJob
    schedule: every minute
  expire_managed_node_leases:
    class: ManagedNodes::ExpireLeasesJob
    schedule: every 5 minutes
  prune_zombie_gcp_resources:
    class: Maintenance::PruneZombieGcpResourcesJob
    schedule: every 15 minutes
  hourly_activity_digest:
    class: Maintenance::HourlyActivityDigestJob
    schedule: every hour at minute 5
  clear_node_diagnose_results:
    class: Maintenance::ClearNodeDiagnoseResultsJob
    schedule: every hour at minute 24

production:
  ensure_runtime_bundles:
    command: "Runtime::EnsureBundles.enqueue"
    schedule: every 5 minutes
  reconcile_direct_dns_ingresses:
    class: EnvironmentIngresses::ReconcileAllJob
    schedule: every minute
  expire_managed_node_leases:
    class: ManagedNodes::ExpireLeasesJob
    schedule: every 10 minutes
  recover_stale_schedulings:
    class: Deployments::RecoverStaleSchedulingsJob
    schedule: every minute
  prune_zombie_gcp_resources:
    class: Maintenance::PruneZombieGcpResourcesJob
    schedule: every 15 minutes
  hourly_activity_digest:
    class: Maintenance::HourlyActivityDigestJob
    schedule: every hour at minute 5
  clear_node_diagnose_results:
    class: Maintenance::ClearNodeDiagnoseResultsJob
    schedule: every hour at minute 24

  clear_solid_queue_finished_jobs:
    command: "SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)"
    schedule: every hour at minute 12
