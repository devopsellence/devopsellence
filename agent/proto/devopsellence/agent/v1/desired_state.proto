syntax = "proto3";

package devopsellence.agent.v1;

option go_package = "github.com/devopsellence/devopsellence/agent/internal/desiredstatepb;desiredstatepb";

message DesiredState {
  reserved 1, 3, 5, 6;
  reserved "node_id", "containers", "init", "release_command";
  string revision = 2;
  Ingress ingress = 4;
  repeated NodePeer node_peers = 7;
  uint32 schema_version = 8;
  repeated Environment environments = 9;
}

message Environment {
  string name = 1;
  string revision = 2;
  repeated Service services = 3;
  repeated Task tasks = 4;
}

message Service {
  string name = 1;
  string kind = 2;
  string image = 3;
  repeated string entrypoint = 4;
  repeated string command = 5;
  map<string, string> env = 6;
  map<string, string> secret_refs = 7;
  Healthcheck healthcheck = 8;
  repeated ServicePort ports = 9;
  repeated VolumeMount volume_mounts = 10;
}

message ServicePort {
  string name = 1;
  uint32 port = 2;
}

message Healthcheck {
  reserved 1;
  reserved "test";
  int64 interval_seconds = 2;
  int64 timeout_seconds = 3;
  int32 retries = 4;
  int64 start_period_seconds = 5;
  string path = 6;
  uint32 port = 7;
}

message VolumeMount {
  string source = 1;
  string target = 2;
}

message Task {
  string name = 1;
  string image = 2;
  repeated string entrypoint = 3;
  repeated string command = 4;
  map<string, string> env = 5;
  map<string, string> secret_refs = 6;
  repeated VolumeMount volume_mounts = 7;
}

message Ingress {
  reserved 5, 6;
  reserved "tunnel_token", "tunnel_token_secret_ref";

  repeated string hosts = 1;
  string mode = 2;
  IngressTLS tls = 3;
  bool redirect_http = 4;
  repeated IngressRoute routes = 7;
}

message IngressRoute {
  IngressMatch match = 1;
  IngressTarget target = 2;
}

message IngressMatch {
  string hostname = 1;
  string path_prefix = 2;
}

message IngressTarget {
  string environment = 1;
  string service = 2;
  string port = 3;
}

message IngressTLS {
  string mode = 1;
  string email = 2;
  string ca_directory_url = 3;
}

message NodePeer {
  string name = 1;
  repeated string labels = 2;
  string public_address = 3;
}
