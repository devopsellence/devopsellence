default: &default
  dispatchers:
    - polling_interval: 1
      batch_size: 500
  workers:
    - queues:
        - default
        - solid_queue_recurring
      threads: <%= ENV.fetch("JOB_THREADS", 2) %>
      processes: <%= ENV["SOLID_QUEUE_IN_PUMA"].present? ? ENV.fetch("JOB_CONCURRENCY_IN_PUMA", 1) : ENV.fetch("JOB_CONCURRENCY", 1) %>
      polling_interval: 0.1
    - queues:
        - bundle_refill
      threads: 1
      processes: <%= ENV["SOLID_QUEUE_IN_PUMA"].present? ? 1 : ENV.fetch("BUNDLE_REFILL_JOB_CONCURRENCY", 1) %>
      polling_interval: 0.1

development:
  <<: *default

test:
  <<: *default

production:
  <<: *default
