<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420" role="img" aria-labelledby="title desc">
  <title id="title">devopsellence runtime model</title>
  <desc id="desc">A diagram showing CLI or control plane publishing desired state to a node agent, which reconciles Docker containers, Envoy ingress, and status.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#087f5b"/>
    </marker>
    <linearGradient id="panel" x1="0" x2="1">
      <stop offset="0" stop-color="#f5f8f6"/>
      <stop offset="1" stop-color="#edf7f1"/>
    </linearGradient>
  </defs>
  <rect width="960" height="420" rx="18" fill="#fbfdfc"/>
  <rect x="28" y="28" width="904" height="364" rx="16" fill="url(#panel)" stroke="#b2c0b8"/>
  <text x="60" y="74" fill="#111713" font-family="ui-sans-serif, system-ui, sans-serif" font-size="28" font-weight="700">desired state is the write boundary</text>
  <text x="60" y="104" fill="#3f4943" font-family="ui-sans-serif, system-ui, sans-serif" font-size="16">solo and shared use the same deployment model; only ownership, persistence, and transport change.</text>

  <g font-family="ui-sans-serif, system-ui, sans-serif">
    <rect x="66" y="154" width="190" height="98" rx="10" fill="#ffffff" stroke="#748078"/>
    <text x="92" y="192" fill="#111713" font-size="18" font-weight="700">CLI</text>
    <text x="92" y="220" fill="#3f4943" font-size="14">plan, publish, inspect</text>

    <rect x="66" y="272" width="190" height="72" rx="10" fill="#ffffff" stroke="#748078"/>
    <text x="92" y="314" fill="#111713" font-size="18" font-weight="700">Control plane</text>
    <text x="92" y="334" fill="#3f4943" font-size="14">shared coordination</text>

    <rect x="382" y="174" width="196" height="118" rx="10" fill="#111713"/>
    <text x="421" y="220" fill="#fbfdfc" font-size="20" font-weight="700">node agent</text>
    <text x="421" y="250" fill="#d8e1dc" font-size="14">reconcile loop</text>

    <rect x="704" y="132" width="158" height="62" rx="10" fill="#ffffff" stroke="#748078"/>
    <text x="742" y="169" fill="#111713" font-size="17" font-weight="700">Docker</text>
    <rect x="704" y="214" width="158" height="62" rx="10" fill="#ffffff" stroke="#748078"/>
    <text x="746" y="252" fill="#111713" font-size="17" font-weight="700">Envoy</text>
    <rect x="704" y="296" width="158" height="62" rx="10" fill="#ffffff" stroke="#748078"/>
    <text x="745" y="334" fill="#111713" font-size="17" font-weight="700">Status</text>
  </g>

  <path d="M256 203h112" stroke="#087f5b" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M256 308c74 0 78-47 112-58" stroke="#087f5b" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M578 218c54-20 72-48 120-54" stroke="#087f5b" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M578 238h120" stroke="#087f5b" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M704 329c-64 20-86-6-126-56" stroke="#087f5b" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
</svg>
