name: E2E Runner Image

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - .github/workflows/e2e-runner-image.yml
      - test/e2e/runner.Dockerfile
      - control-plane/Gemfile
      - control-plane/Gemfile.lock
      - control-plane/vendor/**
      - control-plane/.ruby-version

permissions:
  contents: read

env:
  E2E_RUNNER_IMAGE: devopsellence/e2e-runner:ci

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        with:
          context: control-plane
          file: test/e2e/runner.Dockerfile
          load: true
          tags: ${{ env.E2E_RUNNER_IMAGE }}
