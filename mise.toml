[tasks."test:agent"]
description = "Run agent tests"
dir = "agent"
run = "mise run test"

[tasks."test:cli"]
description = "Run CLI tests"
dir = "cli"
run = "mise run test"

[tasks."test:cp"]
description = "Run control plane tests"
dir = "control-plane"
run = "mise run test"

[tasks."e2e-shared"]
description = "Run the hermetic shared mode e2e workflow"
run = "ruby test/e2e/e2e.rb"

[tasks."e2e-solo"]
description = "Run the solo mode e2e workflow (CLI + Agent, no control plane)"
run = "ruby test/e2e/solo_e2e.rb"

[tasks."e2e-runner-image-build"]
description = "Build the local e2e runner image"
run = "docker build -f test/e2e/runner.Dockerfile -t ${DEVOPSELLENCE_E2E_RUNNER_IMAGE:-devopsellence/e2e-runner:local} control-plane"

[tasks."test:all"]
description = "Run all tests"
depends = ["test:agent", "test:cli", "test:cp"]

[tasks."build:agent"]
description = "Build agent"
dir = "agent"
run = "mise run build"

[tasks."build:cli"]
description = "Build CLI"
dir = "cli"
run = "mise run build"

[tasks."fmt:agent"]
description = "Format agent Go files"
dir = "agent"
run = "mise run fmt"
