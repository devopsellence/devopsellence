schema_version: 1
organization: solo
project: {{APP_NAME}}
default_environment: production

build:
  context: .
  dockerfile: Dockerfile
  platforms:
    - linux/amd64

services:
  web:
    ports:
      - name: http
        port: 8080
    healthcheck:
      path: /healthz
      port: 8080
    env:
      ADDR: ":8080"
      DB_PATH: "/data/app.sqlite"
    volumes:
      - source: {{APP_NAME}}-data
        target: /data
