name: Docs Website CI

on:
  push:
    branches: [master]
    paths:
      - .github/workflows/docs-website-ci.yml
      - docs-website/**
      - mise.toml
  pull_request:
    paths:
      - .github/workflows/docs-website-ci.yml
      - docs-website/**
      - mise.toml

permissions:
  contents: read

defaults:
  run:
    working-directory: docs-website

env:
  ASTRO_TELEMETRY_DISABLED: "1"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24.13.0
          cache: npm
          cache-dependency-path: docs-website/package-lock.json
      - run: npm ci
      - run: npm run build
