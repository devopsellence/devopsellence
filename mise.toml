[tasks."release:cli:local"]
description = "Build the CLI from current HEAD and install it locally like the public installer"
run = "./cli/scripts/release-local.sh"

[tasks."fmt:agent"]
description = "Format node agent Go files"
dir = "agent"
run = "mise run fmt"
