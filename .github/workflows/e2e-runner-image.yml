name: E2E Runner Image

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - .github/workflows/e2e-runner-image.yml
      - test/e2e/runner.Dockerfile
      - control-plane/Gemfile
      - control-plane/Gemfile.lock
      - control-plane/vendor/**
      - control-plane/.ruby-version

permissions:
  contents: read
  packages: write

env:
  E2E_RUNNER_IMAGE_NAME: devopsellence-e2e-runner-v2

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Normalize owner
        id: owner
        run: echo "value=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v7
        with:
          context: control-plane
          file: test/e2e/runner.Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.value }}/${{ env.E2E_RUNNER_IMAGE_NAME }}:master
            ghcr.io/${{ steps.owner.outputs.value }}/${{ env.E2E_RUNNER_IMAGE_NAME }}:${{ github.sha }}
