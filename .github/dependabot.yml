version: 2
updates:
  - package-ecosystem: gomod
    directory: /agent
    schedule:
      interval: weekly
    labels: [dependencies, go]
    open-pull-requests-limit: 5
    groups:
      go-minor-and-patch:
        patterns: ["*"]
        update-types: [minor, patch]

  - package-ecosystem: gomod
    directory: /cli
    schedule:
      interval: weekly
    labels: [dependencies, go]
    open-pull-requests-limit: 5
    groups:
      go-minor-and-patch:
        patterns: ["*"]
        update-types: [minor, patch]

  - package-ecosystem: bundler
    directory: /control-plane
    schedule:
      interval: weekly
    labels: [dependencies, ruby]
    open-pull-requests-limit: 5
    groups:
      bundler-minor-and-patch:
        patterns: ["*"]
        update-types: [minor, patch]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels: [dependencies, github-actions]
    open-pull-requests-limit: 2
    groups:
      github-actions:
        patterns: ["*"]
