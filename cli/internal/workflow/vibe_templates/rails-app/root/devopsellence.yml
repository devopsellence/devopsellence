schema_version: 1
organization: solo
project: {{APP_NAME}}
default_environment: production

build:
  context: .
  dockerfile: Dockerfile
  platforms:
    - linux/amd64

services:
  web:
    ports:
      - name: http
        port: 3000
    healthcheck:
      path: /up
      port: 3000
    volumes:
      - source: {{APP_NAME}}-storage
        target: /rails/storage
    env:
      RAILS_ENV: production
    secret_refs:
      - name: SECRET_KEY_BASE
        secret: SECRET_KEY_BASE

tasks:
  release:
    service: web
    command:
      - ./bin/rails
      - db:prepare
